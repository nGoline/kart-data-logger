[env]
framework = arduino
monitor_speed = 115200
build_flags =
	-Ofast
	-Wall
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    -I lib/shared

[env:logger]
extends = env
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32s3
upload_port = /dev/cu.usbmodem1101
build_src_filter = +<main_logger.cpp> +<SmokeTest.cpp> -<main_display.cpp>
build_flags =
    ${env.build_flags}
    -D IS_LOGGER
    ; -D USE_FAKE_GPS # Comment this out to use real GPS data
    -D GPS_PROVIDER_ATGM336 # Uncomment to select ATGM336 (10Hz). Default is u-blox (5Hz).
    -D HAS_STARTUP_AUDIO_CUES
    ; -D SMOKE_TEST # Comment this out to enable normal operation
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.filesystem = littlefs
board_build.partitions = partitions/seed_xiao_esp32s3.csv
lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.12

; ── Shared display hardware settings ─────────────────────────────────────────
[display_common]
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board        = JC3248W535N
upload_port  = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101
build_src_filter = +<main_display.cpp> -<main_logger.cpp>
lib_deps_base =
    lvgl/lvgl @ ^9.5.0
    electroniccats/MPU6050@^1.3.1
    mikalhart/TinyGPSPlus@^1.0.3

; Display with helmet board — GPS comes from helmet via ESP-NOW
[env:display]
extends = env
platform         = ${display_common.platform}
board            = ${display_common.board}
upload_port      = ${display_common.upload_port}
monitor_port     = ${display_common.monitor_port}
build_src_filter = ${display_common.build_src_filter}
lib_deps         = ${display_common.lib_deps_base}
lib_ignore       = GpsManager, TinyGPSPlus
build_flags =
    ${env.build_flags}
    -D IS_DISPLAY
    -D HAS_HELMET
    -D GPS_PROVIDER_ATGM336
    ; -D ENABLE_IMU
    -I include/display
    -D LV_CONF_PATH=\"${platformio.include_dir}/display/lv_conf.h\"
extra_scripts = pre:fix_stride.py

; Display standalone — GPS wired directly (RX=36 / TX=37), no helmet board
[env:display_standalone]
extends = env
platform         = ${display_common.platform}
board            = ${display_common.board}
upload_port      = ${display_common.upload_port}
monitor_port     = ${display_common.monitor_port}
build_src_filter = ${display_common.build_src_filter}
lib_deps = ${display_common.lib_deps_base}
build_flags =
    ${env.build_flags}
    -D IS_DISPLAY
    ; -D GPS_PROVIDER_ATGM336
    -D GPS_STANDALONE_RX=17
    -D GPS_STANDALONE_TX=18
    ; -D ENABLE_IMU
    -I include/display
    -D LV_CONF_PATH=\"${platformio.include_dir}/display/lv_conf.h\"
extra_scripts = pre:fix_stride.py
