[env]
framework = arduino
monitor_speed = 115200
monitor_filters = 
	esp32_exception_decoder
	time
	log2file
build_flags = 
	-Ofast
	-Wall
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    -I lib/shared

[env:logger]
extends = env
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32s3
upload_port = /dev/cu.usbmodem101
build_src_filter = +<main_logger.cpp> +<SmokeTest.cpp> -<main_display.cpp>
build_flags = 
    ${env.build_flags}
    -D IS_LOGGER
    ; -D USE_FAKE_GPS # Comment this out to use real GPS data
    -D GPS_PROVIDER_ATGM336 # Uncomment to select ATGM336 (10Hz). Default is u-blox (5Hz).
    ; -D HAS_STARTUP_AUDIO_CUES
    ; -D SMOKE_TEST # Comment this out to enable normal operation
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.filesystem = littlefs
board_build.partitions = partitions/seed_xiao_esp32s3.csv
lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.12
    electroniccats/MPU6050@^1.3.1

[env:logger_ota]
extends = env:logger
upload_protocol = espota
upload_port = kart-logger.local
upload_flags =
	--auth=kart-logger-ota

[env:display]
extends = env
platform = espressif32 @ 6.13.0
board = esp32-3248S035C
upload_port = //dev/cu.usbserial-210
build_src_filter = +<main_display.cpp> -<main_logger.cpp>
lib_deps = 
    rzeldent/esp32_smartdisplay@2.1.1
build_flags = 
    ${env.build_flags}
    -D IS_DISPLAY
    -I include/display
    -D LV_CONF_PATH=\"${platformio.include_dir}/display/lv_conf.h\"
extra_scripts = pre:fix_stride.py

[env:display_ota]
extends = env:display
upload_protocol = espota
upload_port = kart-display.local
upload_flags =
	--auth=kart-display-ota